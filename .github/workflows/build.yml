# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Opt the JavaScript runner actions (checkout, setup-node, ...) onto
# Node 24 internals now rather than waiting for the 2026-06-02
# default switchover. Silences the "Node.js 20 actions are
# deprecated" annotation on every run. Independent of the matrix
# below — that controls which Node the project's tests run on.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [24.x, latest]

    runs-on: ${{ matrix.os }}

    # The npm package lives in ts/ (ts/ and go/ are self-contained
    # per-language projects). Run all shell steps there.
    defaults:
      run:
        working-directory: ts

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

